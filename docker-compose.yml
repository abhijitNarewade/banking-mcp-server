services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banking_mcp
      POSTGRES_USER: banking_mcp
      POSTGRES_PASSWORD: banking_mcp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_mcp -d banking_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  banking-mcp-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking_mcp
      SPRING_DATASOURCE_USERNAME: banking_mcp
      SPRING_DATASOURCE_PASSWORD: banking_mcp
    ports:
      - "8080:8080"
